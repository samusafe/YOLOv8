# ============================================================
# Training Configuration — YOLOv8s Shelves Detector (v2.0)
# ============================================================

task: detect
model: yolov8s.pt
data: submissao/dataset/data.yaml
epochs: 150
batch: 16
imgsz: 640
optimizer: auto
lr0: 0.01
lrf: 0.01
momentum: 0.937
weight_decay: 0.0005
warmup_epochs: 3.0
amp: true

augmentation:
  mosaic: 1.0
  fliplr: 0.5
  hsv_h: 0.015
  hsv_s: 0.7
  hsv_v: 0.4
  translate: 0.1
  scale: 0.5
  erasing: 0.4

hardware: NVIDIA GeForce RTX 4060 (8GB VRAM)
framework: ultralytics (YOLOv8)
